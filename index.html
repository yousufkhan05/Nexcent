<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexcent</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">

</head>

<body class="inter-font px-5">
    <!-- HEADER SECTION -->
    <header>
        <nav class="container mx-auto mt-10 flex justify-between items-center">
            <!-- LOGO -->
            <div class="flex gap-2">
                <img class="min-w-8 h-7" src="./Nexcent/Icon (1).png">
                <h1 class="font-bold text-xl">Nexcent</h1>
            </div>
            <!-- ITEM -->
            <div class="flex gap-4 items-center">
                <ul class="hidden md:flex gap-8 ">
                    <li class="text-amber-300 font-bold hover:scale-150  transition">About</li>
                    <li class="text-green-400 font-bold hover:scale-150  transition">Product</li>
                    <li class="text-purple-500 font-bold hover:scale-150  transition">Items</li>
                    <li class="text-pink-400 font-bold hover:scale-150  transition">Contuct</li>
                    <li class="text-blue-400 font-bold hover:scale-150  transition">Pricing</li>
                </ul>
                <button
                    class="hidden md:flex py-2 px-4  bg-[#4CAF4F] text-white rounded-lg items-center gap-y-1 cursor-pointer">Register
                    Now <i class="fa-solid fa-arrow-right"></i></button>
                <div class="block md:hidden hover:scale-130 hover:rotate-180 focus:scale-130 transition">
                    <i class="fa-solid fa-bars-staggered text-xl"></i>
                </div>
            </div>
        </nav>
    </header>
</body>

</html>
